name: Meowmory CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: meowmory
          POSTGRES_USER: meowmory
          POSTGRES_PASSWORD: meowmory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meowmory -d meowmory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      MEOWMORY_DATABASE_URL: postgresql+psycopg2://meowmory:meowmory@127.0.0.1:5432/meowmory
      MEOWMORY_REDIS_URL: redis://127.0.0.1:6379/0
      MEOWMORY_REDIS_ENABLED: "1"
      MEOWMORY_JWT_SECRET: ci-only-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Compile Python sources
        run: python -m compileall -q app ../scripts

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: meowmory-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  configuration:
    name: Configuration checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
