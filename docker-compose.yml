services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meowmory
      POSTGRES_USER: meowmory
      POSTGRES_PASSWORD: meowmory
    ports:
      - "5432:5432"
    volumes:
      - meowmory-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - meowmory-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meowmory-postgres:
  meowmory-redis:
